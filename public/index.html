<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Form Discovery</title>
</head>
<body>
  <!-- This file exists solely to help Netlify discover the form schema during build -->
  <form name="monkey-guy-estimate" data-netlify="true" enctype="multipart/form-data" hidden>
    <input type="hidden" name="form-name" value="monkey-guy-estimate" />
    <input type="text" name="full_name" />
    <input type="tel" name="phone_number" />
    <input type="text" name="address" />
    <select name="service_type"></select>
    <input type="file" name="tree_photo" />
    <textarea name="message"></textarea>
  </form>
</body>
</html>
