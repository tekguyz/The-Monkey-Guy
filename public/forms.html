<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Form Discovery</title>
</head>
<body>
  <!-- This file exists solely to help Netlify discover the form schema during build -->
  <form name="monkey-guy-estimate" data-netlify="true" data-netlify-honeypot="bot-field" enctype="multipart/form-data" action="/" method="POST" hidden>
    <input type="hidden" name="form-name" value="monkey-guy-estimate" />
    <input type="text" name="bot-field" />
    <input type="text" name="full_name" />
    <input type="tel" name="phone_number" />
    <input type="text" name="address" />
    <select name="service_type">
      <option value="tree-removal">Tree Removal</option>
      <option value="tree-trimming">Tree Trimming</option>
      <option value="stump-removal">Stump Removal</option>
      <option value="emergency-tree-service">Emergency Tree Service</option>
      <option value="lawn-care">Lawn Care</option>
      <option value="mulch">Mulch</option>
      <option value="tree-planting">Tree Planting</option>
      <option value="planting">Planting</option>
      <option value="sod-installation">Sod Installation</option>
    </select>
    <input type="file" name="tree_photo" />
    <textarea name="message"></textarea>
  </form>
</body>
</html>
