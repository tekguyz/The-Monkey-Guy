<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netlify Forms Shadow</title>
</head>
<body>
    <!-- This form is for Netlify's build-bot to detect the form fields -->
    <form name="monkey-guy-estimate" data-netlify="true" data-netlify-honeypot="bot-field" method="POST" hidden>
        <input type="text" name="bot-field" />
        <input type="text" name="full_name" />
        <input type="text" name="phone_number" />
        <input type="text" name="service_type" />
        <textarea name="message"></textarea>
    </form>
</body>
</html>
